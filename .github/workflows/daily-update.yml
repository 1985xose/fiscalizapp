name: Actualización diaria de contratos

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update-contratos:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Descargar contratos de la PLACSP
        run: python scripts/ingest_placsp.py

      - name: Detectar banderas rojas
        run: python scripts/detect_flags.py

      - name: Commit y push
        run: |
          git config user.name "FiscalizApp Bot"
          git config user.email "bot@fiscalizapp.es"
          
          # Solo commitear los ficheros pequeños (resumen + flags)
          # El all_contracts.json es grande y está en .gitignore
          git add data/contratos/resumen.json data/contratos/.initialized data/banderas-rojas/latest.json
          
          if git diff --staged --quiet; then
            echo "Sin cambios nuevos"
          else
            FECHA=$(date +%Y-%m-%d)
            FLAGS=$(python3 -c "import json; print(json.load(open('data/banderas-rojas/latest.json'))['stats']['total_flags'])" 2>/dev/null || echo "?")
            MEN=$(python3 -c "import json; print(json.load(open('data/contratos/resumen.json'))['meta']['total_menores'])" 2>/dev/null || echo "?")
            LIC=$(python3 -c "import json; print(json.load(open('data/contratos/resumen.json'))['meta']['total_licitaciones'])" 2>/dev/null || echo "?")
            git commit -m "🔄 ${FECHA}: ${LIC} licitaciones, ${MEN} menores, ${FLAGS} banderas rojas"
            git push
          fi
